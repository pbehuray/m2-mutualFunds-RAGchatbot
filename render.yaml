# Render Blueprint for FastAPI Backend Deployment
# Phase 12: Backend Deployment on Render

services:
  - type: web
    name: mf-chatbot-api
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CHROMA_DB_PATH
        value: ./chroma_db
      - key: PYTHONPATH
        value: /app
      - key: PORT
        value: 8002
      - key: CORS_ORIGINS
        value: "https://*.streamlit.app,https://share.streamlit.io"
