name: Streamlit Deploy

on:
  # Trigger on pushes affecting the Streamlit app
  push:
    branches: [main]
    paths:
      - 'streamlit_app/**'
      - 'Dockerfile'
      - '.github/workflows/streamlit-deploy.yml'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Validate Streamlit App
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlint streamlit requests pydantic

      - name: Syntax check
        run: |
          python -m py_compile streamlit_app/app.py
          echo "Syntax check passed"

      - name: Lint with streamlint
        run: |
          streamlint streamlit_app/app.py || true
          echo "Lint check completed"

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: mf-chatbot-streamlit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker container starts
        run: |
          docker run -d --name test-container -p 8501:8501 mf-chatbot-streamlit:latest
          sleep 15
          curl --fail http://localhost:8501/_stcore/health || echo "Health check failed (may need more startup time)"
          docker stop test-container
