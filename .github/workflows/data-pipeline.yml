name: Data Pipeline

on:
  # Run daily at 04:30 UTC = 10:00 AM IST
  schedule:
    - cron: '30 4 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      skip_scrape:
        description: 'Skip scraping (use existing raw HTML)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # Run on pushes to main that affect pipeline code
  push:
    branches: [main]
    paths:
      - 'phase_2/**'
      - 'phase_3/**'
      - 'scheduler.py'
      - '.github/workflows/data-pipeline.yml'

permissions:
  contents: write

jobs:
  data-pipeline:
    name: Run Full Data Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout code
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set up Python
      # ------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ------------------------------------------------------------------
      # 3. Install all dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phase_2/2.1-web-scraping/requirements.txt
          pip install -r phase_3/3.3-embedding-generation/requirements.txt
          pip install sentence-transformers chromadb

      # ------------------------------------------------------------------
      # 4. Run scheduler
      # ------------------------------------------------------------------
      - name: Run data pipeline
        run: |
          if [ "${{ github.event.inputs.skip_scrape }}" = "true" ]; then
            python scheduler.py --skip-scrape
          else
            python scheduler.py
          fi

      # ------------------------------------------------------------------
      # 5. Upload artifacts
      # ------------------------------------------------------------------
      - name: Upload extracted JSON artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extracted-json
          path: phase_2/scraped-data/extracted_json/*.json
          retention-days: 30

      - name: Upload chunked JSON artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chunked-json
          path: phase_2/scraped-data/chunked_json/*.json
          retention-days: 30

      - name: Upload vector DB artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vector-db
          path: phase_3/vector_db/
          retention-days: 30

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 30

      # ------------------------------------------------------------------
      # 6. Upload scheduler report as workflow summary
      # ------------------------------------------------------------------
      - name: Display scheduler report
        if: always()
        run: |
          if [ -f logs/scheduler_report.json ]; then
            echo "## Scheduler Report" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat logs/scheduler_report.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      # ------------------------------------------------------------------
      # 7. Commit updated data to main so deployments receive fresh snapshots
      # ------------------------------------------------------------------
      - name: Commit updated data
        if: github.ref == 'refs/heads/main' && github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add phase_2/scraped-data/ phase_3/vector_db/ logs/
          git diff --cached --quiet || git commit -m "chore: automated data pipeline refresh [$(date -u +%Y-%m-%d)]"
          git pull --rebase origin main
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
